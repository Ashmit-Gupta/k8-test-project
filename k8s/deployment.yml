apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: k8s-demo-namespace
  labels:
    app: hello-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
        - name: hello-app
          image: ghcr.io/ashmit-gupta/k8-test-project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
