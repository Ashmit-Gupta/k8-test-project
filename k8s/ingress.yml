apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: hello-ingress
  namespace: k8s-demo-namespace

spec:
  ingressClassName: nginx

  rules:
    - host: dev.ashmit.xyz

      http:
        paths:
          - path: /

            pathType: Prefix

            backend:
              service:
                name: hello-service

                port:
                  number: 80