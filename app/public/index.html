<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashmit — Kubernetes Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0c1412;
      --moss: #1a332c;
      --foam: #e8f0ec;
      --mist: #b7c9bf;
      --signal: #e85d04;
      --signal-deep: #c44d00;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Public Sans", system-ui, sans-serif;
      color: var(--foam);
      background: var(--ink);
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      align-items: end;
      isolation: isolate;
    }

    .hero__media {
      position: absolute;
      inset: 0;
      z-index: -2;
      overflow: hidden;
    }

    .hero__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
      transform: scale(1.06);
      animation: drift 18s ease-in-out infinite alternate;
      filter: saturate(0.85) contrast(1.05);
    }

    .hero__veil {
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(12, 20, 18, 0.35) 0%, rgba(12, 20, 18, 0.55) 42%, rgba(12, 20, 18, 0.92) 100%),
        linear-gradient(90deg, rgba(12, 20, 18, 0.55) 0%, transparent 55%);
    }

    .hero__grain {
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: 0.18;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    .frame {
      width: min(1120px, calc(100% - 2.5rem));
      margin: 0 auto;
      padding: 2rem 0 3.5rem;
    }

    .brand {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 800;
      font-size: clamp(3.4rem, 12vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand span {
      color: var(--signal);
    }

    .copy {
      margin-top: 1.25rem;
      max-width: 34rem;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.12s both;
    }

    .copy h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700;
      font-size: clamp(1.35rem, 3.2vw, 2rem);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .copy p {
      margin-top: 0.75rem;
      color: var(--mist);
      font-size: 1.05rem;
      line-height: 1.55;
      font-weight: 400;
    }

    .actions {
      margin-top: 1.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem 1.25rem;
      align-items: center;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.22s both;
    }

    .btn {
      appearance: none;
      border: 0;
      background: var(--signal);
      color: #1a0f08;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.9rem 1.35rem;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .btn:hover {
      background: var(--signal-deep);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .meta {
      color: var(--mist);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .meta strong {
      color: var(--foam);
      font-weight: 600;
    }

    .status-dot {
      display: inline-block;
      width: 0.55rem;
      height: 0.55rem;
      margin-right: 0.45rem;
      background: #3dba7a;
      border-radius: 1px;
      animation: pulse 2.4s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      from { transform: scale(1.06) translate3d(0, 0, 0); }
      to { transform: scale(1.1) translate3d(-1.5%, -1%, 0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero__media img,
      .brand,
      .copy,
      .actions,
      .status-dot {
        animation: none !important;
      }

      .hero__media img {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero__media" aria-hidden="true">
      <img
        src="https://images.unsplash.com/photo-1578574577315-3fbeb0cecbcb?auto=format&amp;fit=crop&amp;w=2400&amp;q=80"
        alt=""
        width="2400"
        height="1600"
      />
    </div>
    <div class="hero__veil" aria-hidden="true"></div>
    <div class="hero__grain" aria-hidden="true"></div>

    <div class="frame">
      <p class="brand">Ashmit<span>.</span>k8</p>
      <div class="copy">
        <h1>Learning Kubernetes, one deploy at a time.</h1>
        <p>
          This page is served from a Node app running in the cluster —
          built, tagged, and rolled out through Jenkins to GHCR.
        </p>
      </div>
      <div class="actions">
        <a class="btn" href="https://github.com/Ashmit-Gupta/k8-test-project" rel="noopener noreferrer" target="_blank">
          View the project
        </a>
        <p class="meta"><span class="status-dot" aria-hidden="true"></span>Cluster route <strong>live</strong></p>
      </div>
    </div>
  </main>
</body>
</html>
